version: 2
updates:
  - package-ecosystem: pip
    directory: "/" # Location of package manifests
    schedule:
      interval: "daily"
      time: "04:00"
      timezone: "Pacific/Auckland"
    labels:
      - "dependencies"
    commit-message:
      prefix: "chore"
      include: "scope"
    reviewers:
      - "andrewdallow"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "04:00"
      timezone: "Pacific/Auckland"
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "chore"